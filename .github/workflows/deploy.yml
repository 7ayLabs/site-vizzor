name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.github/**'
      - 'docs/**'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to deploy'
        required: false
        default: 'main'

concurrency:
  group: deploy-main
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: 7aylabs/site-vizzor

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      sha: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || 'main' }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            GIT_SHA=${{ github.sha }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
            NEXT_PUBLIC_VIZZOR_API_URL=https://api.vizzor.ai

  deploy-vps:
    runs-on: ubuntu-latest
    needs: build-and-push
    timeout-minutes: 10
    if: ${{ !github.event.act }}
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            cd /opt/7aylabs
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull site-vizzor
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --no-deps --force-recreate site-vizzor
            docker image prune -af --filter "until=72h"

      - name: Smoke test
        run: |
          set -e
          # v0.2.x security pass — validate the subsystems map, not
          # just the 200. A degraded watcher or broken SQLite must
          # fail the deploy so we never advertise green when the
          # payment surface is actually down.
          for i in 1 2 3 4 5 6 7 8; do
            sleep 5
            BODY=$(curl -sf https://vizzor.ai/api/health || echo "")
            STATUS=$(echo "$BODY" | jq -r '.status // "down"')
            DB=$(echo "$BODY" | jq -r '.subsystems.sqlite.ok // false')
            WATCHER=$(echo "$BODY" | jq -r '.subsystems.watcher.ok // false')
            echo "attempt $i → status=$STATUS sqlite=$DB watcher=$WATCHER"
            if [ "$STATUS" = "healthy" ] && [ "$DB" = "true" ] && [ "$WATCHER" = "true" ]; then
              exit 0
            fi
          done
          echo "Health check failed: subsystems unhealthy after 8 attempts" >&2
          exit 1
