name: Deploy

# Branch-driven deploy with two environments:
#
#   testing  →  test.vizzor.ai  (staging, Solana devnet)
#   main     →  vizzor.ai       (production, Solana mainnet)
#
# Both targets share one VPS host (per the `deploy.md` runbook).
# The `resolve` job below maps `github.ref` → an env block that every
# downstream step reads. Adding a third target later is a one-block
# extension; no copy-paste of build / push / deploy / smoke.

on:
  push:
    branches: [main, testing]
    paths-ignore:
      - '**.md'
      - '.github/**'
      - 'docs/**'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to deploy (defaults to the workflow branch)'
        required: false
        default: ''

concurrency:
  # Per-target concurrency so a fast follow-up merge to `main` cancels a
  # mid-flight prod deploy from a previous merge, but a `testing` deploy
  # is never cancelled by a `main` deploy (or vice-versa).
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: 7aylabs/site-vizzor

jobs:
  # ────────────────────────────────────────────────────────────────────
  # resolve — map github.ref to the staging-vs-prod parameter bundle.
  # Every downstream job reads from `needs.resolve.outputs.*` so the
  # build / push / deploy / smoke steps are written once.
  # ────────────────────────────────────────────────────────────────────
  resolve:
    runs-on: ubuntu-latest
    outputs:
      target:                 ${{ steps.r.outputs.target }}
      image_tag:              ${{ steps.r.outputs.image_tag }}
      host_url:               ${{ steps.r.outputs.host_url }}
      service_name:           ${{ steps.r.outputs.service_name }}
      compose_overlay:        ${{ steps.r.outputs.compose_overlay }}
      build_api_url:          ${{ steps.r.outputs.build_api_url }}
      payment_network:        ${{ steps.r.outputs.payment_network }}
      allow_dev_auth:         ${{ steps.r.outputs.allow_dev_auth }}
      accept_solana_payments: ${{ steps.r.outputs.accept_solana_payments }}
      checkout_ref:           ${{ steps.r.outputs.checkout_ref }}
    steps:
      - id: r
        run: |
          set -euo pipefail
          REF="${{ inputs.ref }}"
          if [ -z "$REF" ]; then REF="${{ github.ref }}"; fi
          # Resolve canonical branch name regardless of trigger shape.
          case "$REF" in
            main|refs/heads/main)
              echo "target=prod"                                        >> "$GITHUB_OUTPUT"
              echo "image_tag=latest"                                   >> "$GITHUB_OUTPUT"
              echo "host_url=https://vizzor.ai"                         >> "$GITHUB_OUTPUT"
              echo "service_name=site-vizzor"                           >> "$GITHUB_OUTPUT"
              echo "compose_overlay=docker-compose.prod.yml"            >> "$GITHUB_OUTPUT"
              echo "build_api_url=https://api.vizzor.ai"                >> "$GITHUB_OUTPUT"
              echo "payment_network=mainnet"                            >> "$GITHUB_OUTPUT"
              # Production NEVER ships the dev-auth bypass — the
              # downstream client-side cascade dead-codes against this
              # being unset; the server-side route hard-404s.
              echo "allow_dev_auth="                                    >> "$GITHUB_OUTPUT"
              # Production keeps the on-chain checkout gate CLOSED
              # until the mainnet treasury + Solana watcher have been
              # validated end-to-end (see lib/payment/watcher.ts and
              # the runbook in docs/ops). The empty value bakes a
              # falsey check into the bundle so /pay renders the
              # "infrastructure pending" panel rather than minting a
              # real on-chain session against an unverified treasury.
              # Flip to `true` here once the mainnet wiring is signed
              # off.
              echo "accept_solana_payments="                            >> "$GITHUB_OUTPUT"
              echo "checkout_ref=main"                                  >> "$GITHUB_OUTPUT"
              ;;
            testing|refs/heads/testing)
              echo "target=staging"                                     >> "$GITHUB_OUTPUT"
              echo "image_tag=testing"                                  >> "$GITHUB_OUTPUT"
              echo "host_url=https://test.vizzor.ai"                    >> "$GITHUB_OUTPUT"
              echo "service_name=site-vizzor-staging"                   >> "$GITHUB_OUTPUT"
              echo "compose_overlay=docker-compose.staging.yml"         >> "$GITHUB_OUTPUT"
              # Staging shares the prod engine — there is no
              # `api.test.vizzor.ai`. If/when the engine deploys a
              # staging surface, flip this URL here and rebuild.
              echo "build_api_url=https://api.vizzor.ai"                >> "$GITHUB_OUTPUT"
              # test.vizzor.ai runs on Solana devnet (same as localhost
              # dev defaults). Baked at build because `paymentNetwork()`
              # reads `NEXT_PUBLIC_PAYMENT_NETWORK` from both client and
              # server bundles. Keeps Phantom in Testnet Mode signing
              # cleanly on staging without per-deploy env edits.
              echo "payment_network=devnet"                             >> "$GITHUB_OUTPUT"
              # Enable the dev-auth bypass on staging so the cascade
              # silently mints a session via /api/auth/dev-sign when
              # Phantom rejects post-confirm with "Unexpected error"
              # (the documented localhost+Devnet multi-chain bug). The
              # server-side route additionally recognises test.vizzor.ai
              # as a built-in staging origin — no VPS env edit needed.
              echo "allow_dev_auth=true"                                >> "$GITHUB_OUTPUT"
              # Open the on-chain checkout gate on staging so the
              # devnet treasury can actually receive a test payment
              # end-to-end. Without this bake, the client bundle
              # short-circuits into the "infrastructure pending"
              # panel and the watcher never sees a real session
              # being created. Devnet only — prod stays closed
              # (see the `main` branch above) until mainnet wiring
              # is signed off.
              echo "accept_solana_payments=true"                        >> "$GITHUB_OUTPUT"
              echo "checkout_ref=testing"                               >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "::error::Unsupported deploy ref: $REF (only main and testing trigger deploys)"
              exit 1
              ;;
          esac

  # ────────────────────────────────────────────────────────────────────
  # build-and-push — one image per target, two tags (the env tag and a
  # `<branch>-<short-sha>` traceability tag).
  # ────────────────────────────────────────────────────────────────────
  build-and-push:
    runs-on: ubuntu-latest
    needs: resolve
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.checkout_ref }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Tags produced:
          #   - `<env-tag>`               (latest or testing — what compose tracks)
          #   - `<branch>-<short-sha>`    (immutable traceability tag)
          #   - `<short-sha>`             (raw sha for backstop reverts)
          tags: |
            type=raw,value=${{ needs.resolve.outputs.image_tag }}
            type=raw,value=${{ github.ref_name }}-${{ github.sha }},enable=true
            type=sha,prefix=,format=short

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # NEXT_PUBLIC_* vars are baked at build into the JS bundle,
          # so per-env values MUST come from the resolve job — not
          # hardcoded. The same Dockerfile builds both images.
          # `NEXT_PUBLIC_PAYMENT_NETWORK` ships `devnet` for testing
          # (test.vizzor.ai) and `mainnet` for prod (vizzor.ai).
          build-args: |
            GIT_SHA=${{ github.sha }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
            NEXT_PUBLIC_VIZZOR_API_URL=${{ needs.resolve.outputs.build_api_url }}
            NEXT_PUBLIC_PAYMENT_NETWORK=${{ needs.resolve.outputs.payment_network }}
            NEXT_PUBLIC_ALLOW_DEV_AUTH=${{ needs.resolve.outputs.allow_dev_auth }}
            NEXT_PUBLIC_ACCEPT_SOLANA_PAYMENTS=${{ needs.resolve.outputs.accept_solana_payments }}

  # ────────────────────────────────────────────────────────────────────
  # deploy-vps — SSH into the (single) VPS, pull the just-pushed image
  # for the right service, force-recreate the matching container, prune
  # old images. Same host secrets for both targets; the service name and
  # compose overlay carry the env distinction.
  # ────────────────────────────────────────────────────────────────────
  deploy-vps:
    runs-on: ubuntu-latest
    needs: [resolve, build-and-push]
    timeout-minutes: 10
    if: ${{ !github.event.act }}
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          envs: TARGET,SERVICE,OVERLAY
          script_stop: true
          script: |
            set -euo pipefail
            export TARGET="${{ needs.resolve.outputs.target }}"
            export SERVICE="${{ needs.resolve.outputs.service_name }}"
            export OVERLAY="${{ needs.resolve.outputs.compose_overlay }}"
            cd /opt/7aylabs
            echo "▶  Deploying $SERVICE ($TARGET) via $OVERLAY"
            docker compose -f docker-compose.yml -f "$OVERLAY" pull "$SERVICE"
            docker compose -f docker-compose.yml -f "$OVERLAY" up -d --no-deps --force-recreate "$SERVICE"
            docker image prune -af --filter "until=72h"

      - name: Smoke test
        run: |
          set -euo pipefail
          HOST_URL="${{ needs.resolve.outputs.host_url }}"
          TARGET="${{ needs.resolve.outputs.target }}"
          echo "▶  Smoke-testing $TARGET at $HOST_URL/api/health"
          for i in 1 2 3 4 5 6 7 8; do
            sleep 5
            BODY=$(curl -sf "$HOST_URL/api/health" || echo "")
            STATUS=$(echo "$BODY"  | jq -r '.status               // "down"')
            DB=$(echo     "$BODY"  | jq -r '.subsystems.sqlite.ok  // false')
            WATCHER=$(echo "$BODY" | jq -r '.subsystems.watcher.ok // false')
            echo "attempt $i → status=$STATUS sqlite=$DB watcher=$WATCHER"
            if [ "$STATUS" = "healthy" ] && [ "$DB" = "true" ] && [ "$WATCHER" = "true" ]; then
              exit 0
            fi
          done
          echo "::error::Health check failed at $HOST_URL after 8 attempts" >&2
          exit 1
