name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop, feat/**, fix/**, hotfix/**]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck-build:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint || echo "lint not configured yet"
        continue-on-error: true

      - name: Test
        run: pnpm test || echo "no tests yet"
        continue-on-error: true

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_VIZZOR_API_URL: https://api.vizzor.ai
          GIT_SHA: ${{ github.sha }}
          BUILD_TIME: ${{ github.event.head_commit.timestamp || 'pr-build' }}
