# site-vizzor — nginx reverse-proxy server blocks for prod + staging.
#
# Install path on the VPS:  /etc/nginx/sites-available/site-vizzor.conf
# Enable with:              sudo ln -s /etc/nginx/sites-available/site-vizzor.conf \
#                                       /etc/nginx/sites-enabled/site-vizzor.conf
#
# This file starts as HTTP-only on purpose. After it's enabled and nginx
# reloaded, run:
#   certbot --nginx -d vizzor.ai -d www.vizzor.ai \
#                   -d test.vizzor.ai -d testapp.vizzor.ai
# and certbot will edit the file in-place to add the SSL listen directives,
# the certificate paths, and the 80 -> 443 redirects. Re-running certbot
# never duplicates blocks; it's idempotent — adding `testapp.vizzor.ai`
# to an existing deploy just extends the cert SAN list.
#
# After certbot has provisioned the certs, this file owns the proxy
# behaviour and certbot owns the TLS lines. Don't hand-edit the
# certbot-managed lines — re-run certbot if a cert needs to change.
#
# The full operator runbook lives at:
#   docs/ops/vps-bootstrap-site-vizzor.md

# ── upstream blocks — single source of truth for backend ports ───────────
upstream site_vizzor_prod    { server 127.0.0.1:7120; keepalive 32; }
upstream site_vizzor_staging { server 127.0.0.1:7121; keepalive 32; }

# ── Production: vizzor.ai + www.vizzor.ai ────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name vizzor.ai www.vizzor.ai;

    # ACME HTTP-01 challenge for cert issuance + renewal. Lives in this
    # block so renewals work without taking the SSL block down.
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    # Proxy site-vizzor container directly. After certbot adds the
    # 443 block + redirect, this location becomes unreachable for
    # normal browser traffic (redirected to https://), but stays
    # available for ACME and for any HTTP-only health probe.
    location / {
        proxy_pass http://site_vizzor_prod;
        include /etc/nginx/snippets/site-vizzor-proxy-common.conf;
    }

    access_log /var/log/nginx/vizzor.ai.access.log;
    error_log  /var/log/nginx/vizzor.ai.error.log warn;
}

# ── Staging: test.vizzor.ai ──────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name test.vizzor.ai;

    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    # Discourage indexing of the staging surface. Sent on every response
    # via `always` so 5xx replies and redirects still carry the header.
    add_header X-Robots-Tag "noindex, nofollow" always;

    location / {
        proxy_pass http://site_vizzor_staging;
        include /etc/nginx/snippets/site-vizzor-proxy-common.conf;
    }

    access_log /var/log/nginx/test.vizzor.ai.access.log;
    error_log  /var/log/nginx/test.vizzor.ai.error.log warn;
}

# ── Staging (product-only host): testapp.vizzor.ai ───────────────────────
# The staging twin of `app.vizzor.ai`. Same upstream as `test.vizzor.ai`
# because both hostnames land in the same container; the site-vizzor
# middleware inspects the Host header and rewrites `/` → `/app/*` for
# any host listed in APP_HOSTS (see scripts/configure-env.sh). This
# gives QA a URL that behaves exactly like `app.vizzor.ai` but points
# at devnet / the staging DB, so demos + tests stay sealed off from
# prod state.
server {
    listen 80;
    listen [::]:80;
    server_name testapp.vizzor.ai;

    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    add_header X-Robots-Tag "noindex, nofollow" always;

    location / {
        proxy_pass http://site_vizzor_staging;
        include /etc/nginx/snippets/site-vizzor-proxy-common.conf;
    }

    access_log /var/log/nginx/testapp.vizzor.ai.access.log;
    error_log  /var/log/nginx/testapp.vizzor.ai.error.log warn;
}
