# /etc/nginx/snippets/site-vizzor-proxy-common.conf
#
# Common proxy directives shared by every site-vizzor server block.
# Owns the upstream behaviour: HTTP/1.1 + keepalive, real client IP
# forwarding, WebSocket upgrade, sensible timeouts.
#
# The X-Forwarded-For header is the load-bearing piece — the Next.js
# rate-limiter at `lib/payment/rate-limit.ts` reads the first hop here
# to derive the per-IP bucket key (after HMAC-salting). Without it,
# every request would bucket as `127.0.0.1` and the limiter would be
# useless.

proxy_pass_request_headers      on;
proxy_http_version              1.1;

proxy_set_header Host                $host;
proxy_set_header X-Real-IP           $remote_addr;
proxy_set_header X-Forwarded-For     $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto   $scheme;
proxy_set_header X-Forwarded-Host    $host;

# Geo-IP routing — forwards the ISO-3166 country code so
# `middleware.ts`'s `geoRedirect()` can land Latin-American visitors on
# `/es` and Francophone-core visitors on `/fr` before next-intl falls
# back to the Accept-Language heuristic. Without this header, a user in
# Mexico with an `en-US` browser stays on `/` (English) — the symptom
# that prompted this change.
#
# Uncomment AFTER installing the nginx geoip2 module + MaxMind
# GeoLite2-Country.mmdb per `docs/ops/geo-language-detection.md`. The
# `$geoip2_data_country_code` variable is created by the geoip2 module —
# `nginx -t` fails with "unknown variable" if the line is active before
# the module + the geoip2 block in `conf.d/geoip.conf` have shipped.
# proxy_set_header CF-IPCountry        $geoip2_data_country_code;

# WebSocket upgrade — site-vizzor doesn't use WS today, but the
# headers are cheap and future-proof against streaming routes.
proxy_set_header Upgrade             $http_upgrade;
proxy_set_header Connection          "upgrade";

# Timeouts — generous for the watcher liveness probe + initial RSC
# render under cold cache; never long enough to leak idle connections.
proxy_connect_timeout               10s;
proxy_send_timeout                  90s;
proxy_read_timeout                  90s;

# Disable nginx buffering so RSC streams + SSE chat endpoints arrive
# at the browser without head-of-line delays.
proxy_buffering                     off;
proxy_request_buffering             off;
