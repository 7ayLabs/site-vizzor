# site-vizzor compose entry — production (vizzor.ai)
#
# Sibling to docs/ops/site-vizzor-staging-compose-snippet.yml. Both run on
# the same VPS; nginx terminates TLS and reverse-proxies vizzor.ai to
# 127.0.0.1:7120 and test.vizzor.ai to 127.0.0.1:7121.
#
# This snippet is the source of truth. `scripts/bootstrap-stack.sh` strips
# the leading comment header and writes the YAML body into
# /opt/7aylabs/docker-compose.prod.yml. Re-running the bootstrap is the
# correct way to pick up snippet changes on the VPS.
#
# Apply procedure (operator):
#   1. Pull the repo on the VPS:  cd /srv/site-vizzor && git pull
#   2. Re-run the stack bootstrap to refresh the prod overlay:
#        sudo bash scripts/bootstrap-stack.sh
#      (idempotent — preserves the existing .env, only rewrites the YAML)
#   3. Force-recreate the running service:
#        cd /opt/7aylabs
#        docker compose -f docker-compose.yml -f docker-compose.prod.yml \
#          up -d --no-deps --force-recreate site-vizzor
#
# Port 7120 is reserved for site-vizzor in the 71xx block. Do not change.

services:
  site-vizzor:
    image: ghcr.io/7aylabs/site-vizzor:latest
    container_name: site-vizzor
    restart: always
    # ──────────────────────────────────────────────────────────────────
    # Persistent state
    # ──────────────────────────────────────────────────────────────────
    # /app/.vizzor/site.db holds payment_sessions, subscriptions,
    # grants, auth_sessions, wallet_links, and the audit log. Without
    # this volume, every container recreate wipes all of them.
    # The image pre-creates /app/.vizzor owned by nextjs:nodejs so the
    # first volume mount inherits writable ownership (otherwise SQLite
    # fails with EACCES on the WAL file).
    volumes:
      - site-vizzor-db:/app/.vizzor
    # ──────────────────────────────────────────────────────────────────
    # Environment
    # ──────────────────────────────────────────────────────────────────
    # All values come from /opt/7aylabs/.env on the VPS, generated by
    # scripts/configure-env.sh and finalized by the operator (mainnet
    # RPC + treasury). The only inline value is NODE_ENV — the security
    # middleware (HSTS, __Host- cookies, fail-closed env checks) is
    # gated on it and must be hard-pinned to production.
    env_file:
      - /opt/7aylabs/.env
    environment:
      NODE_ENV: production
    # ──────────────────────────────────────────────────────────────────
    # Networking
    # ──────────────────────────────────────────────────────────────────
    # Bind to loopback only; nginx on the VPS handles TLS and the
    # vizzor.ai -> 127.0.0.1:7120 reverse proxy.
    ports:
      - "127.0.0.1:7120:3000"
    networks:
      - 7aylabs_net
    # ──────────────────────────────────────────────────────────────────
    # Healthcheck — matches the HEALTHCHECK in the Dockerfile so compose
    # has a second source of truth. The 8x5s smoke-test cadence in
    # .github/workflows/deploy.yml lives inside the 20s start_period.
    # ──────────────────────────────────────────────────────────────────
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  site-vizzor-db:
    name: site-vizzor-db
    # Default local driver. When the deployment moves off a single VPS,
    # swap to an external CSI driver (managed NFS, EBS, etc.) here.

networks:
  7aylabs_net:
    external: true
